<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="description" content="Kenaz — your private daily wellbeing check-in." />
		<title>Kenaz</title>

		<!-- No-flash theme init: must run BEFORE stylesheets -->
		<script>
			(function () {
				var saved = localStorage.getItem("theme")
				document.documentElement.dataset.theme = saved || "dark"
			})()
		</script>

		<!-- Design system foundation (served from public/design-system) -->
		<link rel="stylesheet" href="/design-system/tokens/index.css" />
		<link rel="stylesheet" href="/design-system/base/reset.css" />
		<link rel="stylesheet" href="/design-system/base/base.css" />
		<link rel="stylesheet" href="/design-system/primitives/index.css" />
		<link rel="stylesheet" href="/design-system/components/index.css" />
		<link rel="stylesheet" href="/design-system/compositions/index.css" />
		<link rel="stylesheet" href="/design-system/utilities/index.css" />
	</head>
	<body>
		<a class="skip-link" href="#main">Skip to content</a>

		<!-- The View renders the whole app (header, screen, bottom tabs) into #main -->
		<main id="main"></main>

		<!-- Visually-hidden live region for save/delete confirmations (persists across re-renders) -->
		<div id="sr-status" class="sr-only" aria-live="polite"></div>

		<!-- Vite entry point -->
		<script type="module" src="/src/main.js"></script>
	</body>
</html>
